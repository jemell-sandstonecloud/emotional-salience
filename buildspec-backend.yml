version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "Installing backend dependencies"
      - yum install -y postgresql15-server postgresql15 || amazon-linux-extras install postgresql14 -y
      - pip install -r requirements.txt

  pre_build:
    commands:
      - echo "Setting up test database"
      - export PGDATA=/tmp/pgdata
      - mkdir -p $PGDATA
      - adduser postgres || true
      - chown postgres $PGDATA
      - su postgres -c "initdb -D $PGDATA"
      - su postgres -c "pg_ctl -D $PGDATA -l /tmp/pg.log start"
      - sleep 2
      - su postgres -c "createuser -s sandstone_admin || true"
      - su postgres -c "createdb -O sandstone_admin sandstone_test || true"
      - echo "Running test suite"
      - TEST_DB_HOST=localhost TEST_DB_PORT=5432 TEST_DB_NAME=sandstone_test TEST_DB_USER=sandstone_admin TEST_DB_PASSWORD='' python -m pytest tests/ -v --tb=short
      - echo "All tests passed"

  build:
    commands:
      - echo "Packaging backend for CodeDeploy"
      - cd infra/lambda_decay
      - pip install -r requirements.txt -t ./package
      - cp lambda_handler.py ./package/
      - cd package
      - zip -r ../../../lambda-decay.zip .
      - cd ../../..
      - aws lambda update-function-code --function-name sandstone-decay-${ENVIRONMENT} --zip-file fileb://lambda-decay.zip --region ${AWS_DEFAULT_REGION} || echo "Lambda update skipped"

  post_build:
    commands:
      - echo "Backend build complete"

artifacts:
  files:
    - "**/*"
  exclude-paths:
    - "frontend/**"
    - "lambda-decay.zip"
    - "__pycache__/**"
    - "*.pyc"
